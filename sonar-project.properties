sonar.projectKey=Rehan0087_CashLens
sonar.projectName=CashLens
sonar.sourceEncoding=UTF-8

# Analyze application code from both parts of the full-stack project.
sonar.sources=client/src,server/src

# Keep dependencies, generated output, runtime data, and documentation out of
# the source analysis scope.
sonar.exclusions=**/node_modules/**,**/dist/**,**/data/**,**/*.log,**/*.tsbuildinfo,docs/**

# Give SonarQube the TypeScript project context for both source trees.
sonar.typescript.tsconfigPaths=client/tsconfig.json,server/tsconfig.json
