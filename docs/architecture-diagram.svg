<text x="360" y="71" font-size="14" font-weight="500" fill="#3C3489">FSP + management</text>
<text x="360" y="89" font-size="12" fill="#534AB7">aggregates only</text>
<rect x="506" y="48" width="146" height="56" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
<text x="518" y="71" font-size="14" font-weight="500" fill="#3C3489">Guided scenarios</text>
<text x="518" y="89" font-size="12" fill="#534AB7">A–D · live feed</text>

