<svg width="680" height="736" viewBox="0 0 680 736" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', sans-serif">
<title>CashLens architecture</title>
<desc>Layered architecture: React client interfaces on top, an Express API boundary with role masking, then analytics engine, alert coordination flow and AI plus monitoring services, all reading a seeded SQLite store with three separated provider lanes.</desc>
